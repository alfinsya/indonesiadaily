<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Images - Seputar Purwasuka</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .article { 
            background: white; 
            padding: 15px; 
            margin: 10px 0; 
            border-left: 4px solid #ffc107; 
            break-inside: avoid;
        }
        .article-title { font-weight: bold; font-size: 14px; color: #333; margin-bottom: 8px; }
        .image-url { 
            font-family: monospace; 
            font-size: 11px; 
            background: #f9f9f9; 
            padding: 8px; 
            border-radius: 3px; 
            color: #666;
            overflow-wrap: break-word;
            margin-bottom: 8px;
        }
        .image-preview { 
            width: 100%; 
            max-width: 400px; 
            height: 200px; 
            object-fit: cover;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: block;
            margin: 8px 0;
        }
        .status {
            padding: 8px 12px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.ok { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>🔍 Debug Images - Articles.json</h1>
    <p>Este script verifica todas las imágenes en articles.json para ver cuáles son válidas.</p>
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');
        
        fetch('articles.json')
            .then(r => r.json())
            .then(articles => {
                console.log('Total articles:', articles.length);
                
                articles.slice(0, 10).forEach((article, idx) => {
                    const container = document.createElement('div');
                    container.className = 'article';
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'article-title';
                    titleDiv.textContent = `[${idx}] ${article.title.substring(0, 60)}...`;
                    container.appendChild(titleDiv);
                    
                    const urlDiv = document.createElement('div');
                    urlDiv.className = 'image-url';
                    urlDiv.textContent = `URL: ${article.image}`;
                    container.appendChild(urlDiv);
                    
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'status loading';
                    statusDiv.textContent = '⏳ Checking...';
                    container.appendChild(statusDiv);
                    
                    const img = new Image();
                    img.onload = () => {
                        statusDiv.className = 'status ok';
                        statusDiv.textContent = '✅ Valid - Image loaded';
                    };
                    img.onerror = () => {
                        statusDiv.className = 'status error';
                        statusDiv.textContent = '❌ Error - Image failed to load';
                    };
                    img.src = article.image;
                    
                    // Add preview if available
                    if (article.image) {
                        const preview = document.createElement('img');
                        preview.className = 'image-preview';
                        preview.src = article.image;
                        preview.alt = article.title;
                        container.appendChild(preview);
                    }
                    
                    resultsDiv.appendChild(container);
                });
            })
            .catch(err => {
                resultsDiv.innerHTML = `<div class="status error">Error loading articles.json: ${err.message}</div>`;
            });
    </script>
</body>
</html>
