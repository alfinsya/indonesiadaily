<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Daftar - Seputar Purwasuka</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Topbar Start -->
    <div class="container-fluid d-none d-lg-block px-0">
        <div class="row align-items-center bg-dark px-lg-5">
            <div class="col-lg-12">
                <nav class="navbar navbar-expand-sm bg-dark p-0">
                    <ul class="navbar-nav ml-auto mr-n2">
                        <li class="nav-item border-right border-secondary">
                            <a class="nav-link text-body small" href="#" id="currentDate"></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-body small" href="index.html">Back to Home</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <div class="row align-items-center bg-white py-3 px-lg-5">
            <div class="col-lg-12 text-center">
                <a href="index.html" class="navbar-brand p-0">
                    <h1 class="m-0 display-4 text-uppercase text-primary">Indonesia<span class="text-secondary font-weight-normal">Daily</span></h1>
                </a>
            </div>
        </div>
    </div>

    <!-- Register Form -->
    <div class="container-fluid py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="bg-white border p-5">
                        <h2 class="text-center mb-4 text-uppercase font-weight-bold">Create Account</h2>
                        
                        <!-- Alert Messages -->
                        <div id="alertMessage" class="alert alert-dismissible fade show" role="alert" style="display: none;">
                            <span id="alertText"></span>
                            <button type="button" class="close" onclick="hideAlert()">
                                <span>&times;</span>
                            </button>
                        </div>

                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label for="fullname">Full Name</label>
                                <input type="text" class="form-control" id="fullname" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Create a password (min 6 characters)" minlength="6" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm-password" placeholder="Confirm your password" required>
                            </div>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">I agree to the Terms and Conditions</label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Register</button>
                            <hr>
                            <div class="text-center">
                                <p>Already have an account? <a href="login.html" class="text-primary font-weight-bold">Login here</a></p>
                            </div>
                            <div class="text-center">
                                <p><a href="test-auth.html" class="text-secondary small">ðŸ"§ Debug Authentication</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark pt-5 px-sm-3 px-md-5">
        <div class="row py-4">
            <div class="col-12 text-center">
                <p class="text-white">&copy; 2026 <a href="index.html" class="text-primary">Seputar Purwasuka</a>. All Rights Reserved.</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    
    <script>
        console.log('ðŸ"„ Register page loaded');
        
        // Function to show alert
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertText.textContent = message;
            alertDiv.style.display = 'block';
            
            console.log(`[ALERT ${type.toUpperCase()}] ${message}`);
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                hideAlert();
            }, 5000);
        }
        
        // Function to hide alert
        function hideAlert() {
            document.getElementById('alertMessage').style.display = 'none';
        }
        
        // Handle registration
        function handleRegister(event) {
            event.preventDefault();
            console.log('ðŸ" Registration attempt started...');
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            console.log('ðŸ'¤ Full name:', fullname);
            console.log('ðŸ"§ Email:', email);
            console.log('ðŸ"± Phone:', phone);
            
            // Validate password match
            if (password !== confirmPassword) {
                console.log('âŒ Passwords do not match');
                showAlert('Password dan konfirmasi password tidak cocok!', 'danger');
                return;
            }
            
            // Validate password length
            if (password.length < 6) {
                console.log('âŒ Password too short');
                showAlert('Password minimal 6 karakter!', 'danger');
                return;
            }
            
            // Get existing users
            const usersString = localStorage.getItem('users');
            console.log('ðŸ'¥ Existing users:', usersString ? 'Found' : 'Not found');
            
            const users = JSON.parse(usersString || '[]');
            console.log('ðŸ'¥ Total existing users:', users.length);
            
            // Check if email already exists
            const existingUser = users.find(u => u.email === email);
            if (existingUser) {
                console.log('âš ï¸ Email already registered');
                showAlert('Email sudah terdaftar. Silakan gunakan email lain atau login.', 'warning');
                return;
            }
            
            // Create new user
            const newUser = {
                fullname: fullname,
                email: email,
                phone: phone,
                password: password,
                registeredAt: new Date().toISOString()
            };
            
            console.log('âž• Creating new user...');
            
            // Add to users array
            users.push(newUser);
            
            // Save to localStorage
            localStorage.setItem('users', JSON.stringify(users));
            console.log('âœ… User saved to localStorage');
            
            // Verify user was saved
            const savedUsers = JSON.parse(localStorage.getItem('users') || '[]');
            console.log('âœ… Total users after save:', savedUsers.length);
            
            // Create session (auto login)
            const session = {
                email: newUser.email,
                name: newUser.fullname,
                loginTime: new Date().toISOString(),
                remember: false
            };
            
            console.log('ðŸ'¾ Creating session:', session);
            localStorage.setItem('userSession', JSON.stringify(session));
            
            // Verify session was saved
            const savedSession = localStorage.getItem('userSession');
            console.log('âœ… Session saved:', savedSession ? 'Success' : 'Failed');
            
            if (savedSession) {
                const parsedSession = JSON.parse(savedSession);
                console.log('âœ… Session verified:', parsedSession.name);
            }
            
            showAlert('Registrasi berhasil! Mengalihkan ke halaman utama...', 'success');
            
            // Redirect to index after 2 seconds
            setTimeout(() => {
                console.log('ðŸ"„ Redirecting to index.html...');
                window.location.href = 'index.html';
            }, 2000);
        }
        
        // Check if already logged in - IMPROVED VERSION
        window.onload = function() {
            console.log('ðŸ" Checking if already logged in...');
            const sessionString = localStorage.getItem('userSession');
            
            if (!sessionString) {
                console.log('âœ… No active session - ready for registration');
                return;
            }
            
            try {
                const session = JSON.parse(sessionString);
                console.log('ðŸ"¦ Session data:', session);
                
                // Validate session has required fields
                if (session && session.name && session.email) {
                    console.log('âœ… Valid session found - user:', session.name);
                    showAlert('Anda sudah login sebagai ' + session.name + '. Mengalihkan...', 'info');
                    setTimeout(() => {
                        console.log('ðŸ"„ Redirecting to index.html...');
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    console.log('âš ï¸ Invalid session (missing fields) - clearing...');
                    localStorage.removeItem('userSession');
                    showAlert('Session tidak valid. Silakan daftar atau login.', 'warning');
                }
            } catch (error) {
                console.error('âŒ Error parsing session:', error);
                console.log('ðŸ-'ï¸ Clearing corrupted session...');
                localStorage.removeItem('userSession');
                showAlert('Session corrupted. Silakan daftar atau login.', 'warning');
            }
        }
        
        // Debug info
        console.log('ðŸ'¾ LocalStorage status:');
        console.log('- users:', localStorage.getItem('users') ? 'EXISTS' : 'NOT FOUND');
        console.log('- userSession:', localStorage.getItem('userSession') ? 'EXISTS' : 'NOT FOUND');
    </script>

    <script>
    const dateElement = document.getElementById("currentDate");

    const today = new Date();

    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };

    const formattedDate = today.toLocaleDateString('en-US', options);

    dateElement.textContent = formattedDate;
    </script>
</body>
</html>
